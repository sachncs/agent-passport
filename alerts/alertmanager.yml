# Agent Passport Alertmanager config.
#
# All URLs/keys are templated via ${VAR} placeholders. Operators replace
# these via `envsubst` or render through their secret manager before
# shipping to Alertmanager. The previous hardcoded EXAMPLE_* values would
# silently route alerts nowhere if shipped as-is.
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity', 'slo']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      group_wait: 10s
      repeat_interval: 1h
      continue: true
    - match:
        severity: warning
      receiver: 'slack-warnings'
      group_wait: 1m
      repeat_interval: 6h
    - match:
        severity: info
      receiver: 'slack-info'
      group_wait: 5m
      repeat_interval: 24h
    - match:
        slo: availability
      receiver: 'pagerduty-slo'
      group_wait: 30s
      repeat_interval: 30m
    - match:
        slo: latency
      receiver: 'pagerduty-slo'
      group_wait: 1m
      repeat_interval: 1h

receivers:
  - name: 'default'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_DEFAULT}'
        channel: '#agent-passport-alerts'
        send_resolved: true

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY_CRITICAL}'
        severity: 'critical'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_CRITICAL}'
        channel: '#agent-passport-critical'
        send_resolved: true
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Runbook: {{ .Annotations.runbook_url }}
          {{ end }}

  - name: 'pagerduty-slo'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY_SLO}'
        severity: 'error'
        send_resolved: true

  - name: 'slack-warnings'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_WARNINGS}'
        channel: '#agent-passport-warnings'
        send_resolved: true
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'

  - name: 'slack-info'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_INFO}'
        channel: '#agent-passport-info'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: ['warning', 'info']
    equal: ['alertname', 'path']