# Agent Passport — SLO Definitions: PROD-STRICT
#
# These SLO targets are ASPIRATIONAL — achievable when the service
# has low-latency access to an Algorand endpoint. This can be one of:
#   - A locally-operated Algorand node (drops per-round-trip from 200-800ms to 5-20ms)
#   - A premium hosted mainnet provider (Nodely, BCC, AlgoNode paid tier)
#   - A geographically co-located Algorand node in the same region
#
# Use this file when you have a low-latency Algorand endpoint and need
# the 500ms P95 SLO. For testnet deployments or any environment using
# the public AlgoNode free tier, use slo-prod-relaxed.yml instead.
#
# Per-endpoint latency projections (from k6 testnet data + low-latency estimate):
#
#   Endpoint             Testnet P95   PROD-STRICT P95 (projected)   Algorand calls
#   /score               1.1s          200ms                        2-3
#   /delegation          1.5s          300ms                        3-4
#   /passport            1.5s          400ms                        6-8
#   /underwrite          2.2s          500ms                        8-12
#   /trust-graph         2.0s          600ms                        10+
#   /credit-estimate     1.5s          350ms                        4-5
#   /counterparty-check  1.1s          300ms                        3-4
#   /reputation          1.0s          250ms                        2
#   /verify              <10ms         <10ms                        0 (cache hit)
#   /discovery/search    <5ms          <5ms                         0 (in-memory)
#
# Use these for: production deployments with a low-latency Algorand endpoint.

groups:
  - name: agent_passport_slo_availability_prod_strict
    rules:
      # Availability target: 99.9% over 30d (production-grade)
      - alert: SLOAvailabilityFastBurnProdStrict
        expr: |
          (
            1 - (
              sum(rate(agent_passport_http_requests_total{status!~"5.."}[1h]))
              /
              sum(rate(agent_passport_http_requests_total[1h]))
            )
          ) > (1 - 0.999) * 2
        for: 2m
        labels:
          severity: critical
          team: platform
          slo: availability-prod-strict
        annotations:
          summary: "SLO (prod-strict): Availability fast burn (2% in 1h)"
          description: "Availability is burning error budget 2x faster than the 99.9% SLO allows."

      - alert: SLOAvailabilitySlowBurnProdStrict
        expr: |
          (
            1 - (
              sum(rate(agent_passport_http_requests_total{status!~"5.."}[6h]))
              /
              sum(rate(agent_passport_http_requests_total[6h]))
            )
          ) > (1 - 0.999) * 5
        for: 5m
        labels:
          severity: warning
          team: platform
          slo: availability-prod-strict
        annotations:
          summary: "SLO (prod-strict): Availability slow burn (5% in 6h)"
          description: "Availability is burning error budget 5x faster than the 99.9% SLO allows."

  - name: agent_passport_slo_latency_prod_strict
    rules:
      # P95 latency target: 500ms over 30d
      # This is the ASPIRATIONAL target — achievable with a low-latency Algorand endpoint
      - alert: SLOLatencyP95FastBurnProdStrict
        expr: |
          histogram_quantile(0.95, sum by (le) (rate(agent_passport_http_request_duration_seconds_bucket[5m]))) > 0.5
        for: 5m
        labels:
          severity: critical
          team: platform
          slo: latency-prod-strict
        annotations:
          summary: "SLO (prod-strict): P95 latency above 500ms"
          description: "P95 latency exceeded 500ms for 5 minutes. If this fires regularly, consider a low-latency Algorand endpoint."

      - alert: SLOLatencyP99FastBurnProdStrict
        expr: |
          histogram_quantile(0.99, sum by (le) (rate(agent_passport_http_request_duration_seconds_bucket[5m]))) > 1.5
        for: 5m
        labels:
          severity: warning
          team: platform
          slo: latency-prod-strict
        annotations:
          summary: "SLO (prod-strict): P99 latency above 1.5s"
          description: "P99 latency exceeded 1.5s for 5 minutes."

  - name: agent_passport_slo_targets_prod_strict
    rules:
      - record: slo_availability_prod_strict_target
        expr: vector(0.999)
        labels:
          target: 0.999
          window: 30d
          description: "Aspirational availability target — achievable with a low-latency Algorand endpoint"
      - record: slo_latency_p95_prod_strict_target
        expr: vector(0.5)
        labels:
          target_seconds: 0.5
          window: 30d
          description: "Aspirational P95 latency target — achievable with a low-latency Algorand endpoint"
      - record: slo_latency_p99_prod_strict_target
        expr: vector(1.5)
        labels:
          target_seconds: 1.5
          window: 30d
          description: "Aspirational P99 latency target"
