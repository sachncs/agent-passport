name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  # Load test smoke — runs on tagged releases only.
  # Full 100/500/1000 VU runs are documented in load-tests/EXECUTION.md and
  # should be executed in a staging environment with a local Algorand node.
  load-test-smoke:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install k6
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget gnupg ca-certificates
          # Fetch the k6 signing key over HTTPS (HKP keyservers are unreliable in CI).
          wget -qO- https://github.com/grafana/k6/raw/main/release-archive-keyring.gpg \
            | sudo tee /usr/share/keyrings/k6-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version
      - run: npm ci
      - run: npm run build
      - name: Start service
        env:
          LOAD_TEST_MODE: '1'
          RATE_LIMIT_MAX: '10000'
          NODE_ENV: development
        run: |
          set -euo pipefail
          mkdir -p load-tests/results
          nohup node dist/index.js > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          ready=0
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::Service failed to become ready within 30s. Server log:"
            cat /tmp/server.log
            exit 1
          fi
      - name: Run load test smoke (5 VU, 30s)
        run: |
          k6 run \
            --duration 30s \
            --vus 5 \
            --out json=load-tests/results/smoke.json \
            --summary-export=load-tests/results/smoke-summary.json \
            load-tests/scenarios/a-100vu.js
      - name: Stop service
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            pkill -P "$(cat /tmp/server.pid)" 2>/dev/null || true
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi
          pkill -f 'node dist/index.js' 2>/dev/null || true
      - name: Dump server log on failure
        if: failure()
        run: |
          echo "::group::Server log"
          cat /tmp/server.log || true
          echo "::endgroup::"
      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-smoke-results
          path: load-tests/results/
          if-no-files-found: ignore
