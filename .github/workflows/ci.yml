name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # Load test smoke — runs on tagged releases only.
  # Full 100/500/1000 VU runs are documented in load-tests/EXECUTION.md and
  # should be executed in a staging environment with a local Algorand node.
  load-test-smoke:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install k6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - run: npm ci
      - run: npm run build
      - name: Start service
        env:
          LOAD_TEST_MODE: '1'
          RATE_LIMIT_MAX: '10000'
          NODE_ENV: development
        run: |
          node dist/index.js &
          echo $! > /tmp/server.pid
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then break; fi
            sleep 1
          done
      - name: Run load test smoke (5 VU, 30s)
        run: k6 run --duration 30s --vus 5 load-tests/scenarios/a-100vu.js
      - name: Stop service
        if: always()
        run: kill $(cat /tmp/server.pid) 2>/dev/null || true
      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-smoke-results
          path: load-tests/results/
          if-no-files-found: ignore
