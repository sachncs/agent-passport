name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '22.23.1'  # LTS pinned — bump in lockstep with .nvmrc / Dockerfile

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Check markdown links
        run: node scripts/ci/check-md-links.mjs
      - name: Test + coverage (thresholds enforced in vitest.config.ts)
        run: npx vitest run --coverage

  build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  # Load test smoke — runs on tagged releases only. Full 100/500/1000 VU
  # runs are documented in load-tests/EXECUTION.md and should be executed
  # in a staging environment with a local Algorand node.
  load-test-smoke:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install k6 (pinned version)
        run: |
          set -euo pipefail
          # Pin to a specific k6 release so the JSON output format doesn't drift
          # between CI runs. Bump consciously.
          K6_VERSION="0.50.0"
          wget -q "https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz"
          tar -xzf "k6-v${K6_VERSION}-linux-amd64.tar.gz"
          sudo mv "k6-v${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version
      - run: npm ci
      - run: npm run build
      - name: Start service
        env:
          LOAD_TEST_MODE: '1'
          RATE_LIMIT_MAX: '10000'
          NODE_ENV: development
        run: |
          set -euo pipefail
          mkdir -p load-tests/results
          nohup node dist/index.js > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          ready=0
          for i in {1..60}; do
            # /ready returns 503 if Algorand is unreachable; both 200 and 503
            # mean the process is up, but only 200 means upstream is healthy.
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ready || true)
            if [ "$code" = "200" ] || [ "$code" = "503" ]; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::Service failed to come up within 60s. Server log:"
            cat /tmp/server.log
            exit 1
          fi
      - name: Run load test smoke (5 VU, 30s)
        run: |
          k6 run \
            --duration 30s \
            --vus 5 \
            --out json=load-tests/results/smoke.json \
            --summary-export=load-tests/results/smoke-summary.json \
            load-tests/scenarios/a-100vu.js
      - name: Stop service
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            pkill -P "$(cat /tmp/server.pid)" 2>/dev/null || true
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi
          pkill -f 'node dist/index.js' 2>/dev/null || true
      - name: Dump server log on failure
        if: failure()
        run: |
          echo "::group::Server log"
          cat /tmp/server.log || true
          echo "::endgroup::"
      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: load-test-smoke-results
          path: load-tests/results/
          if-no-files-found: ignore
